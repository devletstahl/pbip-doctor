<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Main frame + cross: recolor via currentColor (soft charcoal #3A3733 on light, warm cream #E8E1D2 on dark) -->
  <rect x="17" y="17" width="66" height="66" rx="18" fill="none" stroke="currentColor" stroke-width="2.4"/>
  <g fill="currentColor">
    <rect x="53" y="35" width="8" height="30" rx="4"/>
    <rect x="41" y="47" width="30" height="8" rx="4"/>
  </g>
  <!-- Fixed brand accent: muted Power BI gold, breathing gently -->
  <circle cx="26" cy="26" r="2.2" fill="#C9A03D">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.9;2.5;1.9" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
