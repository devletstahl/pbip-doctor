<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Main ring + trace: recolor via currentColor (soft charcoal #3A3733 on light, warm cream #E8E1D2 on dark) -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="currentColor" stroke-width="2.4"/>
  <path d="M 8 50 L 32 50 L 38 37 L 47 63 L 53 50 L 65 50 L 70 43 L 75 50 L 92 50"
        fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fixed brand accent: muted Power BI gold, breathing gently and out of phase -->
  <circle cx="8" cy="50" r="2.4" fill="#C9A03D">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;2.7;2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="92" cy="50" r="2.4" fill="#C9A03D">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;2.7;2" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
</svg>
